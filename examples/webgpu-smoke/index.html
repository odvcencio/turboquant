<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TurboQuant WebGPU Smoke</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(21, 101, 192, 0.12), transparent 38%),
          linear-gradient(180deg, #f7f4ea 0%, #efe7d5 100%);
        color: #18222d;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(760px, 100%);
        background: rgba(255, 252, 245, 0.92);
        border: 1px solid rgba(24, 34, 45, 0.12);
        border-radius: 20px;
        box-shadow: 0 16px 48px rgba(24, 34, 45, 0.12);
        padding: 28px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.6rem, 3vw, 2.4rem);
      }
      p {
        margin: 0 0 16px;
        line-height: 1.5;
      }
      pre {
        margin: 0;
        padding: 16px;
        border-radius: 14px;
        background: #101820;
        color: #f6f4ee;
        overflow: auto;
        min-height: 180px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        margin-bottom: 18px;
        background: rgba(24, 34, 45, 0.08);
        font-weight: 600;
      }
      .pass {
        background: rgba(21, 122, 57, 0.14);
        color: #175e32;
      }
      .fail {
        background: rgba(176, 38, 38, 0.12);
        color: #8e1d1d;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="status" class="status">Booting wasm runtime…</div>
      <h1>TurboQuant WebGPU Smoke</h1>
      <p>
        This page compares the experimental WebGPU prepared-query scorer against
        the CPU prepared-query path on the same deterministic corpus.
      </p>
      <pre id="output"></pre>
    </main>
    <script src="/wasm_exec.js"></script>
    <script type="module">
      const statusEl = document.getElementById("status");
      const outputEl = document.getElementById("output");

      const setStatus = (message, cls = "") => {
        statusEl.textContent = message;
        statusEl.className = `status ${cls}`.trim();
      };

      const go = new Go();
      const wasm = await WebAssembly.instantiateStreaming(fetch("./main.wasm"), go.importObject);
      go.run(wasm.instance);

      const waitForRunner = async () => {
        for (let i = 0; i < 200; i += 1) {
          if (typeof window.runTurboQuantWebGPUSmoke === "function") return;
          await new Promise((resolve) => setTimeout(resolve, 25));
        }
        throw new Error("runTurboQuantWebGPUSmoke was not registered");
      };

      try {
        await waitForRunner();
        setStatus("Running WebGPU smoke…");
        const result = await window.runTurboQuantWebGPUSmoke();
        window.__turboquantWebGPUSmokeResult = result;
        outputEl.textContent = JSON.stringify(result, null, 2);
        setStatus(result.passed ? "Smoke passed" : "Smoke failed", result.passed ? "pass" : "fail");
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        window.__turboquantWebGPUSmokeError = message;
        outputEl.textContent = message;
        setStatus("Smoke failed", "fail");
      }
    </script>
  </body>
</html>
